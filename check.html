.gym-slideshow{

.gym-slideshow img{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    animation: fadeSlide 12s infinite;
}

/* fade timing */
.gym-slideshow img:nth-child(1){ animation-delay: 0s; }
.gym-slideshow img:nth-child(2){ animation-delay: 4s; }
.gym-slideshow img:nth-child(3){ animation-delay: 8s; }

/* Fade  */
@keyframes fadeSlide{
    0%   { opacity:0; }
    10%  { opacity:1; }
    30%  { opacity:1; }
    40%  { opacity:0; }
    100% { opacity:0; }

<script>//JavaScript
//set variables -> change when merging later on 
let currOccupancy =90;
let maxCapacity = 120;

// Occupancy Function -> what to display and where
function Occupancy(){
    let box = document.getElementById("occupancyBox");//box element
    if (box.style.display == "none" || box.style.display ==""){
        
        
        box.style.display = "block";//make visible

        //display varibles
        document.getElementById("curr").textContent = "Current Occupancy: " + currOccupancy;
        document.getElementById("remain").textContent = "Remaining Space: " + (maxCapacity - currOccupancy) ;
    } else{
        //if bpx is visible -> hide
        box.style.display = "none";
    }

}

</script>
