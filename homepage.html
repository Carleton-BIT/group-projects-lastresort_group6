<html>
<head>

<style>

body {
    margin: 0;
}


.header-images{
    display:flex;
    width:100%;
    height:220px;
    border:4px solid darkred;
    background-color:black;
}


.header-images img{
    flex:1;
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

/* RED NAVIGATION AREA */
.red-box {
    background-color: red;
    border: 3px solid darkred;
    padding: 25px;
    width: 100%;
    height: 200px;
    box-sizing: border-box;
    position: relative;
}

label, select {
    display: block;
    margin-bottom: 10px;
}

.occupancy-box {
    position: absolute;
    right: 480px;
    top: 20px;
    width: 140px;
    height: 100px;
    background-color: darkred;
    border: 2px solid black;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}
.occupancy-pop {
    display: none;
    position: absolute;
    right: 0px;
    top: 120px;
    width: 140px;
    background-color: white;
    border: 2px solid black;
    border-radius: 6px;
    padding: 8px;
    box-sizing: border-box;
    font-family: 'Times New Roman', Times, serif;
    font-size: 13px;
    z-index: 100;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    cursor: pointer;        /* shows hand cursor on hover */
    user-select: none;  
}


/* INFO BOX */
.info-box {
    position: absolute;
    right: 20px;
    top: 20px;
    width: 140px;
    height: 100px;
    background-color: white;
    border: 2px solid black;
    padding: 10px;
    box-sizing: border-box;
}

/* SPONSORS BUTTON */
.sponsor-box {
    position: absolute;
    right: 180px;
    top: 20px;
    width: 120px;
    height: 100px;
    background-color: darkred;
    border: 2px solid black;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* WOMEN HOURS BUTTON */
.women-box {
    position: absolute;
    right: 320px;
    top: 20px;
    width: 140px;
    height: 100px;
    background-color: darkred;
    border: 2px solid black;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.occupancy_box a,
.sponsor-box a,
.women-box a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
}

/* to fade pics */
.gym-slideshow{
    width:100%;
    height:400px;           
    position:relative;
    overflow:hidden;
}

.gym-slideshow img{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    animation: fadeSlide 12s infinite;
}

/* fade timing */
.gym-slideshow img:nth-child(1){ animation-delay: 0s; }
.gym-slideshow img:nth-child(2){ animation-delay: 4s; }
.gym-slideshow img:nth-child(3){ animation-delay: 8s; }

/* Fade  */
@keyframes fadeSlide{
    0%   { opacity:0; }
    10%  { opacity:1; }
    30%  { opacity:1; }
    40%  { opacity:0; }
    100% { opacity:0; }
}

</style>
</head>

<script>//JavaScript
//set variables -> change when merging later on 
let currOccupancy =90;
let maxCapacity = 120;

// Occupancy Function -> what to display and where
function Occupancy(){
    let box = document.getElementById("occupancyBox");//box element
    if (box.style.display == "none" || box.style.display ==""){
        
        
        box.style.display = "block";//make visible

        //display varibles
        document.getElementById("curr").textContent = "Current Occupancy: " + currOccupancy;
        document.getElementById("remain").textContent = "Remaining Space: " + (maxCapacity - currOccupancy) ;
    } else{
        //if bpx is visible -> hide
        box.style.display = "none";
    }

}

</script>
