<!DOCTYPE html>
<html>

<head>
<style>/*css*/
/* background style*/
body{

    background: red;
    font-family: 'Times New Roman', Times, serif;
} 
/* For occupancy info*/
.box{
    background: white;
    padding: 20px;
    margin-top: 20px;
    width: 250px;
    border-radius: 8px;
    display: none;/* hidden by default*/
    font-family: 'Times New Roman', Times, serif;
}
/* Button Style*/
button{
    background: white;
    padding: 20px 20px;
    margin-top: 20px;
    font-size: 16px;
    border-radius: 8px;
    font-family: 'Times New Roman', Times, serif;

}
</style>
</head>

<body>

<h1 style="color:black;">Menu</h1>

<!-- If click occupancy button -->
<button onclick="accountDetails()" >Account Details</button>

<!-- display info -->
<div class="box" id="accountBox">
    <p id="name"></p>
    <p id="email"></p>
    <p id="scheduled"></p>
    
</div>

<script>//JavaScript
//set variables -> change when merging later on 
let name ="Joe Smith";
let emailAddress= "joesmith@email.ca";
let upcoming= "March 10, 11:30-12:30";


// Occupancy Function -> what to display and where
function accountDetails(){
    let box = document.getElementById("accountBox");//box element
    if (box.style.display == "none" || box.style.display ==""){
        
        
        box.style.display = "block";//make visible

        //display varibles
        document.getElementById("name").textContent = "Name: " + name;
        document.getElementById("email").textContent = "Email Address: " + emailAddress;
        document.getElementById("scheduled").textContent = "Upcoming Times: " + upcoming;
    } else{
        //if bpx is visible -> hide
        box.style.display = "none";
    }

}

</script>
</body>    
</html>
