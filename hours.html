<html>
<head>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header{
    background-color: red;
    color: white;
    padding: 20px;
    text-align: center;
}

/* HOURS CONTAINER */
.hours-container{
    max-width: 600px;
    margin: 50px auto;
    padding: 20px;
    text-align: center;
}

/* HOURS BOX */
.hours-box{
    background-color: #f5f5f5;
    border: 3px solid red;
    padding: 30px;
    font-size: 22px;
    line-height: 2;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>Carleton University Gym Hours</h2>
</div>

<!-- HOURS -->
<div class="hours-container">

<div class="hours-box">
    <p><strong>Monday - Sunday</strong></p>
    <p>6:00 AM – 10:45 PM</p>
</div>

</div>

</body>
</html>
